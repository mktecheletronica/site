<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKTech Eletrônica - Portal Oficial</title>
    <style>
        :root {
            --primary: #005696;
            --secondary: #0078d4;
            --accent: #00c2ff;
            --bg-dark: #0f172a;
            --text-main: #1e293b;
            --text-light: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Efeito de fundo tecnológico sutil */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(var(--primary) 0.5px, transparent 0.5px);
            background-size: 30px 30px;
            opacity: 0.1;
            z-index: -1;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .logo {
            max-width: 280px;
            height: auto;
            margin-bottom: 25px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-light);
            margin: 25px 0 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .section-title::before, .section-title::after {
            content: "";
            height: 1px;
            background: #e2e8f0;
            flex-grow: 1;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background-color: #f8fafc;
            color: var(--primary);
            text-decoration: none;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.95rem;
        }

        .btn svg {
            width: 20px;
            height: 20px;
            opacity: 0.7;
        }

        .btn:hover {
            background-color: var(--primary);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -5px rgba(0, 86, 150, 0.4);
            border-color: var(--primary);
        }

        .btn:hover svg {
            opacity: 1;
            transform: translateX(3px);
        }

        /* Estilo especial para Downloads */
        .btn-download {
            background-color: #eff6ff;
            border-color: #bfdbfe;
        }

        .footer {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px solid #f1f5f9;
            font-size: 0.75rem;
            color: var(--text-light);
            line-height: 1.6;
        }

        .footer b {
            color: var(--primary);
        }

        /* Animação de entrada */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            animation: fadeInUp 0.6s ease-out;
        }
    </style>
</head>
